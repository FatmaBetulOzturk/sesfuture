<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benim Web Sitem</title>
<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #667eea, #764ba2);
color: white;
text-align: center;
}
header {
padding: 60px 20px;
}
h1 {
font-size: 48px;
margin-bottom: 10px;
}
p {
font-size: 20px;
opacity: 0.9;
}
.btn {
display: inline-block;
margin-top: 30px;
padding: 15px 30px;
background: white;
color: #764ba2;
text-decoration: none;
border-radius: 30px;
font-weight: bold;
transition: 0.3s;
}
.btn:hover {
background: #f1f1f1;
transform: scale(1.05);
}
section {
background: white;
color: #333;
padding: 60px 20px;
}
footer {
padding: 20px;
font-size: 14px;
opacity: 0.8;
}
</style>
</head>
<body>

<header>
<h1>Hoş Geldiniz 🚀</h1>
<p>Bu site tamamen ücretsiz olarak yayında!</p>
<a href="#hakkimda" class="btn">Daha Fazla</a>
</header>

<section id="hakkimda">
<h2>Hakkımda</h2>
<p>Buraya kendinizle ilgili bilgileri yazabilirsiniz.</p>
</section>

<footer>
© 2026 Tüm Hakları Saklıdır
</footer>

</body>
</html>
